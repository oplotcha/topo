<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Topo Pro - Accès Direct</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
    .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
    .active { display: block; }

    /* Header Statut */
    .storage-status { font-size: 11px; padding: 10px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .status-ok { background: #4ade80; }
    .status-no { background: #ef4444; }

    /* Accueil */
    h2 { font-size: 12px; color: #666; text-transform: uppercase; margin: 20px 0 10px; letter-spacing: 1px; }
    .project-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .folder-item { 
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
      padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .folder-item:active { background: #222; }
    .folder-icon { font-size: 20px; }

    /* Dashboard */
    .dashboard { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .main-coords { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
    .val { font-size: 15px; font-weight: 900; color: #fff; font-family: monospace; }
    .label { font-size: 9px; color: #888; text-transform: uppercase; }

    /* Saisie */
    input { width: 100%; background: #1a1a1a; border: 2px solid #333; border-radius: 10px; padding: 14px; color: #fff; font-size: 16px; }
    .btn-add { background: #4ade80; color: #000; border: none; border-radius: 10px; padding: 15px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
    
    .record-section { display: flex; gap: 8px; margin-top: 10px; }
    .record-section input { margin-bottom: 0; flex: 1; font-size: 22px; border-color: #444; }
    .btn-ok { width: 80px; background: #4ade80; border-radius: 10px; border: none; font-weight: 900; font-size: 18px; }
  </style>
</head>
<body>

  <div class="storage-status">
    <span><span id="storage-dot" class="status-dot status-no"></span> DOSSIER TOPO : <b id="root-path">DÉCONNECTÉ</b></span>
    <button id="btn-reconnect" onclick="connectStorage()" style="background:none; border:1px solid #444; color:#888; font-size:10px; padding:2px 6px; border-radius:4px">ACTIVER</button>
  </div>

  <div id="screen-start" class="screen active">
    <h2>Nouveau Chantier</h2>
    <input type="text" id="new-project-name" placeholder="Nom du nouveau projet..." inputmode="text">
    <button class="btn-add" onclick="createNewProject()">Créer le dossier projet</button>

    <h2>Projets dans /topo</h2>
    <div id="folder-list" class="project-grid">
      </div>
  </div>

  <div id="screen-topo" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px">
      <b id="current-project-display" style="color:#4ade80"></b>
      <span onclick="location.reload()" style="font-size:11px; color:#666">RETOUR</span>
    </div>

    <div class="dashboard">
      <div class="main-coords">
        <div><div class="label">X (L93)</div><div class="val" id="x-val">—</div></div>
        <div><div class="label">Y (L93)</div><div class="val" id="y-val">—</div></div>
        <div><div class="label">Z (Alt)</div><div class="val" id="z-val">—</div></div>
      </div>
    </div>

    <div class="record-section">
      <input type="text" id="pt-name" placeholder="Point" inputmode="decimal" enterkeyhint="done">
      <button class="btn-ok" id="btn-rec" disabled onclick="recordPoint()">OK</button>
    </div>

    <div id="list" style="margin-top:20px; display:flex; flex-direction:column; gap:8px"></div>
  </div>

<script>
  const EPSG2154 = "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
  let topoHandle = null;
  let currentFileHandle = null;
  let lastPos = null;

  // Connection au dossier "topo" par défaut
  async function connectStorage() {
    try {
      // On demande à l'utilisateur de pointer sur le dossier "topo"
      topoHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      
      document.getElementById('storage-dot').className = 'status-dot status-ok';
      document.getElementById('root-path').textContent = "ACTIF";
      document.getElementById('btn-reconnect').style.display = 'none';
      
      scanProjects();
    } catch (err) {
      console.log("Accès refusé");
    }
  }

  async function scanProjects() {
    const listCont = document.getElementById('folder-list');
    listCont.innerHTML = '';
    
    for await (const entry of topoHandle.values()) {
      if (entry.kind === 'directory') {
        const div = document.createElement('div');
        div.className = 'folder-item';
        div.onclick = () => openProject(entry.name);
        div.innerHTML = `<span class="folder-icon">📂</span> <b>${entry.name}</b>`;
        listCont.appendChild(div);
      }
    }
  }

  async function createNewProject() {
    if (!topoHandle) return alert("Veuillez d'abord cliquer sur ACTIVER pour lier le dossier topo.");
    const name = document.getElementById('new-project-name').value.trim();
    if (!name) return;
    await topoHandle.getDirectoryHandle(name, { create: true });
    document.getElementById('new-project-name').value = '';
    scanProjects();
  }

  async function openProject(name) {
    const projectFolder = await topoHandle.getDirectoryHandle(name);
    currentFileHandle = await projectFolder.getFileHandle(`${name}.csv`, { create: true });
    
    const file = await currentFileHandle.getFile();
    if (file.size === 0) {
      await writeLine("Nom,X,Y,Z,Heure\n");
    }

    document.getElementById('current-project-display').textContent = name;
    document.getElementById('screen-start').classList.remove('active');
    document.getElementById('screen-topo').classList.add('active');
    
    initGPS();
    document.getElementById('pt-name').focus();
  }

  async function writeLine(text) {
    const writable = await currentFileHandle.createWritable({ keepExistingData: true });
    const file = await currentFileHandle.getFile();
    await writable.write({ type: 'write', position: file.size, data: text });
    await writable.close();
  }

  function initGPS() {
    navigator.geolocation.watchPosition(p => {
      lastPos = p;
      const l93 = proj4("WGS84", EPSG2154, [p.coords.longitude, p.coords.latitude]);
      document.getElementById('x-val').textContent = l93[0].toFixed(2);
      document.getElementById('y-val').textContent = l93[1].toFixed(2);
      document.getElementById('z-val').textContent = p.coords.altitude ? p.coords.altitude.toFixed(2) : 'N/D';
      document.getElementById('btn-rec').disabled = false;
    }, null, { enableHighAccuracy: true });
  }

  async function recordPoint() {
    if (!lastPos || !currentFileHandle) return;
    const nameInput = document.getElementById('pt-name');
    const name = nameInput.value.trim() || Date.now();
    const l93 = proj4("WGS84", EPSG2154, [lastPos.coords.longitude, lastPos.coords.latitude]);
    const z = lastPos.coords.altitude ? lastPos.coords.altitude.toFixed(3) : '';
    
    await writeLine(`${name},${l93[0].toFixed(3)},${l93[1].toFixed(3)},${z},${new Date().toLocaleTimeString()}\n`);

    const item = document.createElement('div');
    item.style = "background:#161616; padding:12px; border-radius:10px; border-left:4px solid #4ade80; font-size:13px";
    item.innerHTML = `<b>${name}</b> | ${l93[0].toFixed(2)} / ${l93[1].toFixed(2)}`;
    const list = document.getElementById('list');
    list.insertBefore(item, list.firstChild);

    nameInput.value = '';
    setTimeout(() => nameInput.focus(), 50);
  }

  document.getElementById('pt-name').addEventListener('keypress', e => { if (e.key === 'Enter') recordPoint(); });
</script>
</body>
</html>
