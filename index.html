<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Topo Pro - Système de Dossiers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
    .screen { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
    .active { display: block; }

    /* Accueil */
    .setup-card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; }
    h2 { margin-bottom: 20px; font-size: 18px; color: #4ade80; text-transform: uppercase; }
    
    /* Dashboard */
    .dashboard { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: sticky; top: 10px; }
    .main-coords { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 12px; }
    .precision-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
    .val { font-size: 15px; font-weight: 900; color: #fff; font-family: monospace; }
    .acc-box { background: #111; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #222; }
    .acc-val { font-size: 12px; font-weight: bold; font-family: monospace; }
    .good { color: #4ade80; } .warn { color: #fbbf24; } .crit { color: #f87171; }

    /* Inputs */
    input { width: 100%; background: #1a1a1a; border: 2px solid #333; border-radius: 10px; padding: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; }
    .btn { background: #4ade80; color: #000; border: none; border-radius: 10px; padding: 15px 25px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; text-transform: uppercase; }
    
    .record-section { display: flex; gap: 8px; margin-bottom: 15px; }
    .record-section input { margin-bottom: 0; flex: 1; font-size: 20px; border-color: #444; }
    .btn-ok { width: auto; padding: 0 30px; }

    .status-bar { font-size: 11px; color: #666; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .points-list { display: flex; flex-direction: column; gap: 8px; }
    .point-item { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <div id="screen-start" class="screen active">
    <div class="setup-card">
      <h2>Nouveau Projet</h2>
      <input type="text" id="project-name" placeholder="NOM DU PROJET" inputmode="text">
      <p style="font-size: 12px; color: #888; margin-bottom: 20px;">
        Cliquez ci-dessous pour choisir votre dossier "topo".<br>Un sous-dossier au nom du projet sera créé.
      </p>
      <button class="btn" onclick="startSystem()">Sélectionner Dossier & Créer</button>
    </div>
  </div>

  <div id="screen-topo" class="screen">
    <div class="status-bar">
      <span>PROJET: <b id="display-project-name" style="color:#4ade80"></b></span>
      <span id="sync-status" style="color:#888">Initialisation...</span>
    </div>
    
    <div class="dashboard">
      <div class="main-coords">
        <div><div class="label">Est (X)</div><div class="val" id="x-val">—</div></div>
        <div><div class="label">Nord (Y)</div><div class="val" id="y-val">—</div></div>
        <div><div class="label">Alt (Z)</div><div class="val" id="z-val">—</div></div>
      </div>
      <div class="precision-bar">
        <div class="acc-box"><div class="label">Préc. XY</div><div class="acc-val" id="acc-h">—</div></div>
        <div class="acc-box"><div class="label">Préc. Z</div><div class="acc-val" id="acc-v">—</div></div>
      </div>
    </div>

    <div class="record-section">
      <input type="text" id="pt-name" placeholder="N° POINT" inputmode="decimal" enterkeyhint="done">
      <button class="btn btn-ok" id="btn-rec" disabled onclick="record()">OK</button>
    </div>

    <div id="list" class="points-list"></div>
  </div>

<script>
  const EPSG2154 = "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
  let lastPos = null;
  let points = [];
  let projectHandle = null;
  let fileHandle = null;

  async function startSystem() {
    const pName = document.getElementById('project-name').value.trim();
    if (!pName) return alert("Nom du projet manquant");

    try {
      // 1. Sélection du dossier parent "topo" par l'utilisateur
      const parentHandle = await window.showDirectoryPicker();
      
      // 2. Création du sous-dossier au nom du projet
      projectHandle = await parentHandle.getDirectoryHandle(pName, { create: true });
      
      // 3. Création du fichier de données (Format CSV pour compatibilité topo directe)
      fileHandle = await projectHandle.getFileHandle(`${pName}.csv`, { create: true });
      
      // Initialiser le header si fichier vide
      const file = await fileHandle.getFile();
      if (file.size === 0) {
        await writeToFile("Nom,X_L93,Y_L93,Z_Ellipsoide,Precision_H,Horodatage\n");
      }

      document.getElementById('display-project-name').textContent = pName;
      document.getElementById('screen-start').classList.remove('active');
      document.getElementById('screen-topo').classList.add('active');
      document.getElementById('sync-status').textContent = "Auto-save actif";
      
      initGPS();
      document.getElementById('pt-name').focus();
    } catch (err) {
      alert("L'accès au dossier est requis pour l'enregistrement automatique.");
      console.error(err);
    }
  }

  async function writeToFile(content) {
    const writable = await fileHandle.createWritable({ keepExistingData: true });
    const file = await fileHandle.getFile();
    await writable.write({ type: 'write', position: file.size, data: content });
    await writable.close();
  }

  function initGPS() {
    navigator.geolocation.watchPosition(p => {
      lastPos = p;
      const l93 = proj4("WGS84", EPSG2154, [p.coords.longitude, p.coords.latitude]);
      document.getElementById('x-val').textContent = l93[0].toFixed(2);
      document.getElementById('y-val').textContent = l93[1].toFixed(2);
      document.getElementById('z-val').textContent = p.coords.altitude ? p.coords.altitude.toFixed(2) : 'N/D';
      
      const hAcc = p.coords.accuracy;
      const hEl = document.getElementById('acc-h');
      hEl.textContent = `± ${hAcc.toFixed(1)}m`;
      hEl.className = 'acc-val ' + (hAcc < 3 ? 'good' : hAcc < 10 ? 'warn' : 'crit');
      
      document.getElementById('btn-rec').disabled = false;
    }, null, { enableHighAccuracy: true });
  }

  async function record() {
    if(!lastPos) return;
    const nameInput = document.getElementById('pt-name');
    const name = nameInput.value.trim() || (points.length + 1);
    const l93 = proj4("WGS84", EPSG2154, [lastPos.coords.longitude, lastPos.coords.latitude]);
    
    const pt = {
      name, x: l93[0].toFixed(3), y: l93[1].toFixed(3), 
      z: lastPos.coords.altitude ? lastPos.coords.altitude.toFixed(3) : '',
      acc: lastPos.coords.accuracy.toFixed(2),
      ts: new Date().toLocaleTimeString()
    };

    // 1. Enregistrement physique immédiat
    const csvLine = `${pt.name},${pt.x},${pt.y},${pt.z},${pt.acc},${pt.ts}\n`;
    try {
      await writeToFile(csvLine);
      document.getElementById('sync-status').textContent = "Dernier point sauvé à " + pt.ts;
      document.getElementById('sync-status').style.color = "#4ade80";
    } catch (e) {
      document.getElementById('sync-status').textContent = "Erreur sauvegarde !";
      document.getElementById('sync-status').style.color = "#ef4444";
    }

    // 2. Mise à jour de la liste visuelle
    points.push(pt);
    nameInput.value = '';
    render();
    setTimeout(() => nameInput.focus(), 50);
  }

  function render() {
    const cont = document.getElementById('list');
    cont.innerHTML = '';
    [...points].reverse().slice(0, 10).forEach(p => {
      const d = document.createElement('div');
      d.className = 'point-item';
      d.innerHTML = `<div><b style="color:#4ade80">${p.name}</b><br><small style="color:#666">X:${p.x} Y:${p.y} Z:${p.z}</small></div>`;
      cont.appendChild(d);
    });
  }

  document.getElementById('pt-name').addEventListener('keypress', e => { if (e.key === 'Enter') record(); });
</script>
</body>
</html>
