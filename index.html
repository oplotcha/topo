<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Topo Pro - Zero Perms</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
    .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
    .active { display: block; }

    /* Accueil */
    h2 { font-size: 11px; color: #666; text-transform: uppercase; margin: 20px 0 10px; letter-spacing: 1px; }
    .card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
    
    .project-item { 
      background: #161616; border: 1px solid #222; border-radius: 10px; 
      padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
    }

    /* Dashboard */
    .dashboard { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .coords-line { font-size: 13px; font-family: monospace; color: #ccc; letter-spacing: 0.04em; margin-bottom: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
    .coords-line span { color: #fff; font-weight: bold; }
    .prec-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
    .prec-val { font-size: 14px; font-weight: 900; font-family: monospace; }
    .prec-val.good { color: #4ade80; }
    .prec-val.mid  { color: #fbbf24; }
    .prec-val.bad  { color: #f87171; }
    .label { font-size: 9px; color: #888; text-transform: uppercase; margin-top: 2px; }
    .rtk-fix   { color: #4ade80; }
    .rtk-float { color: #fbbf24; }
    .rtk-none  { color: #666; }

    /* UI */
    input { width: 100%; background: #000; border: 2px solid #333; border-radius: 10px; padding: 14px; color: #fff; font-size: 16px; }
    .btn { background: #4ade80; color: #000; border: none; border-radius: 10px; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    .btn-small { padding: 6px 12px; font-size: 11px; background: #333; color: #fff; }
    
    .record-section { display: flex; gap: 8px; margin-top: 10px; }
    .record-section input { flex: 1; font-size: 22px; border-color: #444; }
  </style>
</head>
<body>

  <div id="screen-start" class="screen active">
    <h2>Nouveau Projet</h2>
    <div class="card">
      <input type="text" id="new-name" placeholder="Nom du chantier..." style="margin-bottom:10px">
      <button class="btn" style="width:100%" onclick="addProject()">Créer Projet</button>
    </div>

    <h2>Chantiers en mémoire</h2>
    <div id="project-list"></div>
  </div>

  <div id="screen-topo" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center">
      <b id="cur-name" style="color:#4ade80"></b>
      <button class="btn-small" onclick="location.reload()">Menu</button>
    </div>
  <div class="dashboard">
    <div class="coords-line">
      <span>E=</span><span id="x-v">—</span>
      <span>N=</span><span id="y-v">—</span>
      <span>Z=</span><span id="z-v">—</span>
    </div>
    <div class="prec-grid">
      <div>
        <div class="prec-val bad" id="prec-plani">—</div>
        <div class="label">Préc. plani</div>
      </div>
      <div>
        <div class="prec-val bad" id="prec-alti">—</div>
        <div class="label">Préc. alti</div>
      </div>
      <div>
        <div class="prec-val rtk-none" id="rtk-status">—</div>
        <div class="label">RTK</div>
      </div>
    </div>
  </div>


    <div class="record-section">
      <input type="text" id="pt-name" placeholder="N°" inputmode="decimal">
      <button class="btn" id="btn-rec" disabled onclick="recordPoint()">OK</button>
    </div>

    <button class="btn" style="width:100%; margin-top:10px; background:#333; color:#fff" onclick="exportCSV()">Exporter vers /topo</button>
    
    <div id="pt-list" style="margin-top:20px; display:flex; flex-direction:column; gap:6px"></div>
  </div>

<script>
  const EPSG2154 = "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
  let db, curProj, lastPos;

  // Initialisation de la base de données interne (IndexedDB)
  const request = indexedDB.open("TopoDB", 1);
  request.onupgradeneeded = e => e.target.result.createObjectStore("projects", { keyPath: "name" });
  request.onsuccess = e => { db = e.target.result; loadProjects(); };

  function loadProjects() {
    const list = document.getElementById('project-list');
    list.innerHTML = '';
    db.transaction("projects").objectStore("projects").getAll().onsuccess = e => {
      e.target.result.reverse().forEach(p => {
        const d = document.createElement('div');
        d.className = 'project-item';
        d.innerHTML = `<div onclick="openProj('${p.name}')"><b>${p.name}</b><br><small style="color:#666">${p.points.length} points</small></div>
                       <button class="btn-small" style="background:#522" onclick="deleteProj('${p.name}')">×</button>`;
        list.appendChild(d);
      });
    };
  }

  function addProject() {
    const name = document.getElementById('new-name').value.trim();
    if(!name) return;
    const proj = { name, points: [] };
    db.transaction("projects", "readwrite").objectStore("projects").add(proj).onsuccess = () => {
      document.getElementById('new-name').value = '';
      openProj(name);
    };
  }

  function openProj(name) {
    db.transaction("projects").objectStore("projects").get(name).onsuccess = e => {
      curProj = e.target.result;
      document.getElementById('cur-name').textContent = name;
      document.getElementById('screen-start').classList.remove('active');
      document.getElementById('screen-topo').classList.add('active');
      renderPoints();
      initGPS();
      document.getElementById('pt-name').focus();
    };
  }

  function initGPS() {
    navigator.geolocation.watchPosition(p => {
      lastPos = p;
      const l93 = proj4("WGS84", EPSG2154, [p.coords.longitude, p.coords.latitude]);
      document.getElementById('x-v').textContent = l93[0].toFixed(2);
      document.getElementById('y-v').textContent = l93[1].toFixed(2);
      document.getElementById('z-v').textContent = p.coords.altitude !== null ? p.coords.altitude.toFixed(2) : 'N/D';
      document.getElementById('btn-rec').disabled = false;
      
      const hAcc = p.coords.accuracy;
      const vAcc = p.coords.altitudeAccuracy;
      
      const pEl = document.getElementById('prec-plani');
      pEl.textContent = hAcc.toFixed(2) + ' m';
      pEl.className = 'prec-val ' + (hAcc < 0.03 ? 'good' : hAcc < 1 ? 'mid' : 'bad');
      
      const aEl = document.getElementById('prec-alti');
      if (vAcc !== null) {
        aEl.textContent = vAcc.toFixed(2) + ' m';
        aEl.className = 'prec-val ' + (vAcc < 0.1 ? 'good' : vAcc < 2 ? 'mid' : 'bad');
      } else {
        aEl.textContent = 'N/D';
        aEl.className = 'prec-val rtk-none';
      }
      
      const rEl = document.getElementById('rtk-status');
      if (hAcc < 0.03)      { rEl.textContent = 'FIXE';  rEl.className = 'prec-val rtk-fix'; }
      else if (hAcc < 0.3)  { rEl.textContent = 'FLOAT'; rEl.className = 'prec-val rtk-float'; }
      else                  { rEl.textContent = 'N/A';   rEl.className = 'prec-val rtk-none'; }
    }, null, { enableHighAccuracy: true });
  }

  function recordPoint() {
    const input = document.getElementById('pt-name');
    const l93 = proj4("WGS84", EPSG2154, [lastPos.coords.longitude, lastPos.coords.latitude]);
    const pt = {
      n: input.value || (curProj.points.length + 1),
      x: l93[0].toFixed(3), y: l93[1].toFixed(3),
      z: lastPos.coords.altitude ? lastPos.coords.altitude.toFixed(3) : ''
    };
    curProj.points.push(pt);
    db.transaction("projects", "readwrite").objectStore("projects").put(curProj);
    input.value = '';
    renderPoints();
    setTimeout(() => input.focus(), 50);
  }

  function renderPoints() {
    const list = document.getElementById('pt-list');
    list.innerHTML = '';
    [...curProj.points].reverse().slice(0, 5).forEach(p => {
      const d = document.createElement('div');
      d.style = "background:#161616; padding:10px; border-radius:8px; font-size:12px; border-left:3px solid #4ade80";
      d.innerHTML = `<b>${p.n}</b> | X:${p.x} Y:${p.y} Z:${p.z}`;
      list.appendChild(d);
    });
  }

  function exportCSV() {
    let csv = "\uFEFFNom,X,Y,Z\n" + curProj.points.map(p => `${p.n},${p.x},${p.y},${p.z}`).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = `${curProj.name}.csv`;
    a.click();
  }

  function deleteProj(name) {
    if(confirm("Supprimer ?")) {
      db.transaction("projects", "readwrite").objectStore("projects").delete(name).onsuccess = loadProjects;
    }
  }

  document.getElementById('pt-name').addEventListener('keypress', e => { if(e.key==='Enter') recordPoint(); });
</script>
</body>
</html>
