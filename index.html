<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Topo Pro V3</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Topo Pro">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #000; padding: 15px; }
    .screen { display: none; max-width: 500px; margin: 0 auto; }
    .active { display: block; }
    h2 { font-size: 10px; color: #64748b; text-transform: uppercase; margin: 15px 0 8px; font-weight: 800; }
    .card { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 15px; }
    .dashboard { background: #f1f5f9; border: 1px solid #94a3b8; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .coords-line { font-size: 13px; font-family: monospace; display: flex; justify-content: space-between; margin-bottom: 10px; }
    .prec-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; text-align: center; }
    .prec-val { font-size: 11px; font-weight: 900; font-family: monospace; padding: 4px; border-radius: 4px; background: #e2e8f0; }
    .good { background: #dcfce7; color: #166534; }
    .bad { background: #fee2e2; color: #991b1b; }
    input { width: 100%; border: 1px solid #94a3b8; border-radius: 8px; padding: 10px; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
    .btn-rec { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: 900; text-transform: uppercase; font-size: 16px; color: #fff; background: #2563eb; cursor: pointer; }
    .btn-rec:disabled { background: #cbd5e1 !important; color: #fff !important; }
    .btn-rec.locked { background: #ef4444 !important; color: #fff !important; }
    .btn-small { padding: 6px 10px; font-size: 10px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; }
    .pt-row { background: #f8fafc; padding: 10px; border-radius: 6px; font-size: 11px; border: 1px solid #e2e8f0; border-left: 4px solid #2563eb; margin-bottom: 4px; font-family: monospace; }
  </style>
</head>
<body>

  <div id="screen-start" class="screen active">
    <h2>Nouveau projet</h2>
    <div class="card">
      <input type="text" id="new-name" placeholder="NOM DU CHANTIER...">
      <button class="btn-rec" style="font-size:12px; padding:10px;" onclick="addProject()">Créer projet</button>
    </div>
    <div id="project-list"></div>
  </div>

  <div id="screen-topo" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <b id="cur-name" style="color:#2563eb"></b>
      <button class="btn-small" onclick="location.reload()">Menu</button>
    </div>

    <div class="dashboard">
      <div class="coords-line">
        <span>E: <span id="x-v">0.00</span></span>
        <span>N: <span id="y-v">0.00</span></span>
        <span>Z: <span id="z-v">0.00</span></span>
      </div>
      <div class="prec-grid">
        <div id="prec-plani" class="prec-val">0.00m</div>
        <div id="prec-alti" class="prec-val">0.00m</div>
        <div id="rtk-status" class="prec-val">N/A</div>
      </div>
    </div>

    <div style="display:flex; gap:5px; margin-bottom:10px;">
      <div style="width:60px"><small>N°</small><input type="number" id="pt-num"></div>
      <div style="flex:1"><small>Code</small><input type="text" id="pt-code" inputmode="decimal"></div>
      <div style="width:80px"><small>H. Canne</small><input type="number" id="pt-hc" value="2.000" step="0.001"></div>
    </div>

    <button id="btn-rec" class="btn-rec" disabled onclick="recordPoint()">Attente GPS...</button>
    <div id="pt-list" style="margin-top:15px"></div>
  </div>

<script>
  const EPSG2154 = "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
  let db, curProj, lastPos;

  // DB
  const req = indexedDB.open("TopoDB", 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore("projects", { keyPath: "name" });
  req.onsuccess = e => { db = e.target.result; loadProjects(); };

  function loadProjects() {
    const list = document.getElementById('project-list');
    list.innerHTML = '';
    db.transaction("projects").objectStore("projects").getAll().onsuccess = e => {
      e.target.result.reverse().forEach(p => {
        const d = document.createElement('div');
        d.className = 'card';
        d.style.display = 'flex'; d.style.justifyContent = 'space-between';
        d.innerHTML = `<span onclick="openProj('${p.name}')"><b>${p.name}</b> (${p.points.length} pts)</span>
                       <button class="btn-small" onclick="exportCSV('${p.name}')">CSV</button>`;
        list.appendChild(d);
      });
    };
  }

  function addProject() {
    const n = document.getElementById('new-name').value;
    if(!n) return;
    db.transaction("projects","readwrite").objectStore("projects").add({name:n, points:[]}).onsuccess = () => openProj(n);
  }

  function openProj(n) {
    db.transaction("projects").objectStore("projects").get(n).onsuccess = e => {
      curProj = e.target.result;
      document.getElementById('cur-name').textContent = n;
      document.getElementById('screen-start').classList.remove('active');
      document.getElementById('screen-topo').classList.add('active');
      document.getElementById('pt-num').value = curProj.points.length + 1;
      initGPS();
    };
  }

  function initGPS() {
    navigator.geolocation.watchPosition(p => {
      lastPos = p;
      const c = p.coords;
      const l93 = proj4("WGS84", EPSG2154, [c.longitude, c.latitude]);
      document.getElementById('x-v').textContent = l93[0].toFixed(2);
      document.getElementById('y-v').textContent = l93[1].toFixed(2);
      document.getElementById('z-v').textContent = c.altitude ? c.altitude.toFixed(2) : '0.00';
      
      const hAcc = c.accuracy;
      const pEl = document.getElementById('prec-plani');
      pEl.textContent = hAcc.toFixed(2)+'m';
      pEl.className = 'prec-val ' + (hAcc < 0.05 ? 'good' : 'bad');

      const btn = document.getElementById('btn-rec');
      if(hAcc < 0.05) {
        btn.disabled = false; btn.classList.remove('locked'); btn.textContent = "ENREGISTRER POINT";
        document.getElementById('rtk-status').textContent = "FIXE";
        document.getElementById('rtk-status').className = 'prec-val good';
      } else {
        btn.disabled = true; btn.classList.add('locked'); btn.textContent = "ATTENTE FIX ("+hAcc.toFixed(2)+"m)";
        document.getElementById('rtk-status').textContent = "PRÉC.";
        document.getElementById('rtk-status').className = 'prec-val bad';
      }
    }, null, {enableHighAccuracy:true});
  }

  async function recordPoint() {
    const btn = document.getElementById('btn-rec');
    btn.disabled = true; btn.textContent = "CALCUL RAF20...";
    
    const num = document.getElementById('pt-num').value;
    const code = document.getElementById('pt-code').value.toUpperCase() || "PT";
    const hc = parseFloat(document.getElementById('pt-hc').value) || 2.0;
    
    const lon = lastPos.coords.longitude;
    const lat = lastPos.coords.latitude;
    const hEllip = lastPos.coords.altitude;

    try {
      // Version ultra-directe pour éviter les blocages CORS
      const url = `https://data.geopf.fr/altimetrie/1.0/calcul/altimetrique.json?lon=${lon}&lat=${lat}&resource=api-rest&indent=false`;
      const res = await fetch(url);
      const data = await res.json();
      
      let zNGF = data.elevations[0].z;
      let zFinal = zNGF - hc;

      savePt(num, code, hc, lon, lat, zFinal, "IGN69");
    } catch (err) {
      console.log("Erreur API, bascule Ellip");
      savePt(num, code, hc, lon, lat, hEllip - hc, "ELLIP (Erreur Réseau)");
    }
  }

  function savePt(n, c, hc, lon, lat, z, note) {
    const l93 = proj4("WGS84", EPSG2154, [lon, lat]);
    const pt = { n, code:c, x:l93[0].toFixed(3), y:l93[1].toFixed(3), z:z.toFixed(3), hc:hc.toFixed(3), note };
    curProj.points.push(pt);
    db.transaction("projects","readwrite").objectStore("projects").put(curProj).onsuccess = () => {
      document.getElementById('pt-num').value = parseInt(n)+1;
      document.getElementById('btn-rec').disabled = false;
      document.getElementById('btn-rec').textContent = "ENREGISTRER POINT";
      renderPoints();
    };
  }

  function renderPoints() {
    const l = document.getElementById('pt-list');
    l.innerHTML = '';
    [...curProj.points].reverse().slice(0,5).forEach(p => {
      const d = document.createElement('div'); d.className='pt-row';
      d.innerHTML = `<b>#${p.n}</b> [${p.code}] Z:${p.z} <small>(${p.note})</small>`;
      l.appendChild(d);
    });
  }

  function exportCSV(n) {
    db.transaction("projects").objectStore("projects").get(n).onsuccess = e => {
      const p = e.target.result;
      let csv = "Num,Code,X,Y,Z,HC,Note\n";
      p.points.forEach(pt => csv += `${pt.n},${pt.code},${pt.x},${pt.y},${pt.z},${pt.hc},${pt.note}\n`);
      const blob = new Blob([csv], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=n+".csv"; a.click();
    };
  }
</script>
</body>
</html>
