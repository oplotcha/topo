<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Topo Pro - High Visibility</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #FFFFFF; color: #000000; min-height: 100vh; }
    .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
    .active { display: block; }

    h2 { font-size: 10px; color: #64748b; text-transform: uppercase; margin: 15px 0 8px; letter-spacing: 1px; font-weight: 800; }
    
    .card { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 15px; }
    .project-item {
      background: #FFFFFF; border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
    }

    .dashboard { background: #f1f5f9; border: 1px solid #94a3b8; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .coords-line {
      font-size: 13px; font-family: monospace; color: #000;
      letter-spacing: 0.02em; margin-bottom: 10px;
      display: flex; justify-content: space-between;
    }
    .coords-line span { font-weight: 900; }

    .prec-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; text-align: center; }
    .prec-val { font-size: 13px; font-weight: 900; font-family: monospace; padding: 3px; border-radius: 4px; }
    
    .prec-val.good { background: #dcfce7; color: #166534; }
    .prec-val.mid  { background: #fef9c3; color: #854d0e; }
    .prec-val.bad  { background: #fee2e2; color: #991b1b; }
    
    .label { font-size: 9px; color: #64748b; text-transform: uppercase; margin-top: 3px; font-weight: bold; }
    
    .rtk-fix   { color: #2563eb; }
    .rtk-float { color: #d97706; }

    input { 
      width: 100%; background: #FFFFFF; border: 1px solid #94a3b8; 
      border-radius: 8px; padding: 10px; color: #000; font-size: 16px;
    }
    input:focus { outline: none; border-color: #2563eb; background: #f0f7ff; }

    /* Bouton Créer Projet plus fin */
    .btn-create { 
      background: #2563eb; color: #FFFFFF; border: none; border-radius: 8px; 
      padding: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; 
      width: 100%; margin-top: 8px;
    }

    /* Bouton OK principal */
    .btn-rec { 
      background: #2563eb; color: #FFFFFF; border: none; border-radius: 10px; 
      padding: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; 
      width: 100%;
    }
    .btn-rec:disabled { background: #e2e8f0 !important; color: #94a3b8 !important; cursor: not-allowed; }
    .btn-rec.locked { background: #ef4444 !important; color: #FFFFFF !important; }
    
    .btn-small { padding: 6px 10px; font-size: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; }

    .record-section { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
    .fields-row { display: flex; gap: 8px; align-items: flex-end; }

    .pt-row { 
      background: #f8fafc; padding: 10px; border-radius: 6px; 
      font-size: 12px; font-family: monospace; color: #000;
      border-left: 4px solid #2563eb; margin-bottom: 4px;
      border: 1px solid #e2e8f0; border-left: 4px solid #2563eb;
    }
  </style>
</head>
<body>

  <div id="screen-start" class="screen active">
    <h2>Nouveau projet</h2>
    <div class="card">
      <input type="text" id="new-name" placeholder="NOM DU CHANTIER...">
      <button class="btn-create" onclick="addProject()">Créer projet</button>
    </div>
    <h2>Chantiers en mémoire</h2>
    <div id="project-list"></div>
  </div>

  <div id="screen-topo" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center">
      <b id="cur-name" style="color:#2563eb; font-size:15px"></b>
      <button class="btn-small" style="background:#000; color:#fff" onclick="location.reload()">Menu</button>
    </div>

    <div class="dashboard">
      <div class="coords-line">
        <span>E= <span id="x-v">—</span></span>
        <span>N= <span id="y-v">—</span></span>
        <span>Z= <span id="z-v">—</span></span>
      </div>
      <div class="prec-grid">
        <div><div class="prec-val bad" id="prec-plani">—</div><div class="label">Plani</div></div>
        <div><div class="prec-val bad" id="prec-alti">—</div><div class="label">Alti</div></div>
        <div><div class="prec-val rtk-none" id="rtk-status">—</div><div class="label">Statut</div></div>
      </div>
    </div>

    <div class="record-section">
      <div class="fields-row">
        <div style="flex: 0 0 70px;">
          <div class="label">N°</div>
          <input type="number" id="pt-num" style="text-align:center;">
        </div>
        <div style="flex: 1;">
          <div class="label">Code</div>
          <input type="text" id="pt-code" placeholder="Code..." autocomplete="off" inputmode="decimal">
        </div>
        <div style="flex: 0 0 90px;">
          <div class="label">H. Canne</div>
          <input type="number" id="pt-hc" value="0.000" step="0.001" inputmode="decimal" style="text-align:center;">
        </div>
      </div>
      <button class="btn-rec" id="btn-rec" disabled onclick="recordPoint()">Initialisation...</button>
    </div>

    <div id="pt-list" style="margin-top:15px; display:flex; flex-direction:column; gap:4px"></div>
  </div>

<script>
  const EPSG2154 = "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
  const LIMIT_RTK = 0.04; 
  let db, curProj, lastPos;

  const request = indexedDB.open("TopoDB", 1);
  request.onupgradeneeded = e => e.target.result.createObjectStore("projects", { keyPath: "name" });
  request.onsuccess = e => { db = e.target.result; loadProjects(); };

  function loadProjects() {
    const list = document.getElementById('project-list');
    list.innerHTML = '';
    db.transaction("projects").objectStore("projects").getAll().onsuccess = e => {
      e.target.result.reverse().forEach(p => {
        const d = document.createElement('div');
        d.className = 'project-item';
        d.innerHTML = `
          <div onclick="openProj('${p.name}')" style="cursor:pointer; flex:1">
            <b style="font-size:15px">${p.name}</b><br><small style="color:#64748b">${p.points.length} pts</small>
          </div>
          <div style="display:flex; gap:6px;">
            <button class="btn-small" style="background:#2563eb; color:#fff" onclick="exportSpecificCSV('${p.name}')">Export</button>
            <button class="btn-small" style="background:#fee2e2; color:#991b1b" onclick="deleteProj('${p.name}')">×</button>
          </div>`;
        list.appendChild(d);
      });
    };
  }

  function addProject() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) return;
    const proj = { name, points: [] };
    db.transaction("projects", "readwrite").objectStore("projects").add(proj).onsuccess = () => {
      document.getElementById('new-name').value = '';
      openProj(name);
    };
  }

  function openProj(name) {
    db.transaction("projects").objectStore("projects").get(name).onsuccess = e => {
      curProj = e.target.result;
      document.getElementById('cur-name').textContent = name;
      document.getElementById('screen-start').classList.remove('active');
      document.getElementById('screen-topo').classList.add('active');
      const lastNum = curProj.points.length > 0 ? Math.max(...curProj.points.map(p => parseInt(p.n) || 0)) : 0;
      document.getElementById('pt-num').value = lastNum + 1;
      renderPoints();
      initGPS();
      setTimeout(() => document.getElementById('pt-code').focus(), 150);
    };
  }

  function initGPS() {
    navigator.geolocation.watchPosition(p => {
      lastPos = p;
      const l93 = proj4("WGS84", EPSG2154, [p.coords.longitude, p.coords.latitude]);
      document.getElementById('x-v').textContent = l93[0].toFixed(2);
      document.getElementById('y-v').textContent = l93[1].toFixed(2);
      document.getElementById('z-v').textContent = p.coords.altitude !== null ? p.coords.altitude.toFixed(2) : 'N/D';

      const hAcc = p.coords.accuracy;
      const vAcc = p.coords.altitudeAccuracy;
      
      const pEl = document.getElementById('prec-plani');
      pEl.textContent = hAcc.toFixed(2) + 'm';
      pEl.className = 'prec-val ' + (hAcc < LIMIT_RTK ? 'good' : hAcc < 0.30 ? 'mid' : 'bad');

      const aEl = document.getElementById('prec-alti');
      if (vAcc) {
        aEl.textContent = vAcc.toFixed(2) + 'm';
        aEl.className = 'prec-val ' + (vAcc < 0.08 ? 'good' : vAcc < 0.5 ? 'mid' : 'bad');
      }

      const rEl = document.getElementById('rtk-status');
      const btnRec = document.getElementById('btn-rec');

      if (hAcc < LIMIT_RTK) {
        rEl.textContent = 'FIXE';
        rEl.className = 'prec-val rtk-fix';
        btnRec.disabled = false;
        btnRec.classList.remove('locked');
        btnRec.textContent = "ENREGISTRER POINT";
      } else {
        rEl.textContent = hAcc < 0.30 ? 'FLOAT' : 'PRÉC.';
        rEl.className = hAcc < 0.30 ? 'prec-val rtk-float' : 'prec-val rtk-none';
        btnRec.disabled = true;
        btnRec.classList.add('locked');
        btnRec.textContent = "ATTENTE FIX (" + hAcc.toFixed(2) + "m)";
      }
    }, null, { enableHighAccuracy: true });
  }

  function recordPoint() {
    if (!lastPos || lastPos.coords.accuracy >= LIMIT_RTK) return;
    const numInput = document.getElementById('pt-num');
    const codeInput = document.getElementById('pt-code');
    const hcInput = document.getElementById('pt-hc');
    const l93 = proj4("WGS84", EPSG2154, [lastPos.coords.longitude, lastPos.coords.latitude]);
    const hc = parseFloat(hcInput.value) || 0;
    const zBrut = lastPos.coords.altitude;

    const pt = {
      n: numInput.value,
      code: codeInput.value.trim().toUpperCase(),
      hc: hc.toFixed(3),
      x: l93[0].toFixed(3),
      y: l93[1].toFixed(3),
      z: zBrut !== null ? (zBrut - hc).toFixed(3) : ''
    };

    curProj.points.push(pt);
    db.transaction("projects", "readwrite").objectStore("projects").put(curProj);
    numInput.value = parseInt(numInput.value) + 1;
    renderPoints();
    setTimeout(() => codeInput.focus(), 50);
  }

  function renderPoints() {
    const list = document.getElementById('pt-list');
    list.innerHTML = '';
    [...curProj.points].reverse().slice(0, 8).forEach(p => {
      const d = document.createElement('div');
      d.className = 'pt-row';
      d.innerHTML = `<b>#${p.n}</b> <span style="color:#2563eb">${p.code}</span> | E:${p.x} N:${p.y} Z:${p.z}`;
      list.appendChild(d);
    });
  }

  function exportSpecificCSV(name) {
    db.transaction("projects").objectStore("projects").get(name).onsuccess = e => {
      const p = e.target.result;
      if (!p || p.points.length === 0) return alert("Aucun point.");
      const csv = "\uFEFFNum,Code,X,Y,Z,HautCanne\n" + p.points.map(pt => `${pt.n},${pt.code},${pt.x},${pt.y},${pt.z},${pt.hc}`).join('\n');
      const a = document.createElement('a
